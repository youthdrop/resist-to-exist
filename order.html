<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BBQ Plate & Shirt Prepay | Resist to Exist</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="order-page">
    <section class="full-story">
      <p class="story-label">Community Fundraiser</p>
      <h1>Prepay for BBQ Plates & Campaign Shirts</h1>

      <form id="orderForm">
        <label>Name</label>
        <input type="text" name="name" required />

        <label>Telephone Number</label>
        <input type="tel" name="phone" required />

        <label>Number of BBQ Plates</label>
        <input type="number" id="bbqQty" name="bbqQty" min="0" max="50" value="0" />

        <p class="order-note">
          BBQ Plate - $20 each. 
        </p>

        <label>Campaign Shirt Size</label>
        <select id="shirtSize" name="shirtSize">
          <option value="">No shirt</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="2XL">2XL</option>
          <option value="3XL">3XL</option>
        </select>

        <p class="order-note">
          Campaign Shirt - $25 each.
        </p>

        <div class="total-box">
          Total: $<span id="total">0</span>
        </div>

        <button class="btn primary full" type="submit">
          Submit Order & Pay
        </button>
      </form>
    </section>
  </main>

  <script src="order.js"></script>
</body>
</html>
